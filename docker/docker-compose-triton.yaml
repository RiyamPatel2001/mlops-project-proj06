services:
  triton_server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton-server
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../triton/models:/models
    # Run explicit load list so Triton never attempts the known-bad tfidf ZipMap ONNX.
    # This removes startup "failed to load all models" and keeps benchmark models ready.
    command:
      [
        "tritonserver",
        "--model-repository=/models",
        "--model-control-mode=explicit",
        "--load-model=distilbert_classifier",
        "--load-model=minilm_classifier",
      ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: triton_server
    shm_size: "16g"
    # Ensures the GPU is passed through with `docker compose up` (some setups ignore `deploy:`).
    gpus: all
    networks:
      - triton_net

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../evaluation:/workspace/evaluation
      - ../scripts:/workspace/scripts
      - ../triton:/workspace/triton
      - ../data:/workspace/data
    working_dir: /workspace
    container_name: jupyter_triton
    shm_size: "16g"
    networks:
      - triton_net

networks:
  triton_net:
    driver: bridge
