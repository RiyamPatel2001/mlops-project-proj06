services:
  triton_server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton-server
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../triton/models:/models
    # strict-readiness=false: server stays up if one model fails (e.g. missing artifact).
    command:
      [
        "tritonserver",
        "--model-repository=/models",
        "--strict-readiness=false",
      ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: triton_server
    shm_size: "16g"
    networks:
      - triton_net

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../evaluation:/workspace/evaluation
      - ../scripts:/workspace/scripts
      - ../triton:/workspace/triton
      - ../data:/workspace/data
    working_dir: /workspace
    container_name: jupyter_triton
    shm_size: "16g"
    networks:
      - triton_net

networks:
  triton_net:
    driver: bridge
