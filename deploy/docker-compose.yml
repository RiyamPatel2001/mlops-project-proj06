services:
  serving:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: ml-serving:latest
    build:
      context: ../serving
      dockerfile: Dockerfile
    container_name: ml-serving
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: mlops-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal:15432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  actual:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: actual-custom:latest
    build:
      context: ../actual
      dockerfile: sync-server.Dockerfile
      args:
        BUILD_NODE_MEMORY_MB: ${ACTUAL_BUILD_NODE_MEMORY_MB:-4096}
    container_name: actual-budget
    ports:
      - "5006:5006"
    volumes:
      - actual-data:/data
    restart: unless-stopped

volumes:
  actual-data:
