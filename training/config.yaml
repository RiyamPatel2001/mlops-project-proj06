# config.yaml
# ──────────────────────────────────────────────────────────────
# Single source of truth for a training run.
# Change "model" to switch candidates — train.py dispatches
# to the matching module in models/.
#
# Usage:
#   python3 train.py --config config.yaml
# ──────────────────────────────────────────────────────────────

# ── Which model to train ──────────────────────────────────────
# Options (as you build them out):
#   tfidf_logreg | fasttext | minilm | distilbert | mpnet
model: fasttext

# ── Data paths ────────────────────────────────────────────────
# Paths are relative to the training/ directory (where train.py lives).
# In Docker (WORKDIR=/app/training), data is volume-mounted at /app/data.
data:
  raw_path:      "http://minio.mlops.svc.cluster.local:9000/data/raw/train.csv"
  processed_dir: ../data/processed/
  retraining_prefix: "data/retraining/"

# ── Split config ──────────────────────────────────────────────
val_frac:     0.2   # fraction of users held out for validation
random_state: 42    # controls user split + any model randomness

# ── Model output ──────────────────────────────────────────────
model_output_dir: models/layer1/artifacts/

# ── MLflow ────────────────────────────────────────────────────
mlflow:
  tracking_uri:    http://129.114.26.157:30500    # swap for Chameleon VM IP at runtime
  experiment_name: layer1-categorizer

promotion:
  target_tier: fast
  registry_path: ../serving/layer1_registry.json
  minimum_accuracy_delta: 0.0
  bootstrap:
    model_name: fasttext
    model_kind: fasttext
    run_id: e99c0f7fe5554fd584c9efd2162f5572
    artifact_path: fasttext.bin

# ── MinIO (for storing data) ─────────────────────────────
minio:
  endpoint: "http://minio.mlops.svc.cluster.local:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin123"
  bucket: "data"

# ── Model-specific hyperparameters ───────────────────────────
# Only the section matching "model" above is used by train.py.

tfidf_logreg:
  C:            1.0
  class_weight: balanced
  max_iter:     1000

fasttext:
  lr:           0.1
  epoch:        25
  wordNgrams:   2
  dim:          100

minilm:
  learning_rate:    2.0e-5
  num_epochs:       3
  batch_size:       32
  warmup_steps:     100
  max_length:       64       # max token length for payee strings

distilbert:
  learning_rate:    2.0e-5
  num_epochs:       3
  batch_size:       16       # smaller — DistilBERT is heavier than MiniLM
  warmup_steps:     100
  max_length:       64

mpnet:
  learning_rate:    2.0e-5
  num_epochs:       3
  batch_size:       32       # all-mpnet is same size as MiniLM (768-dim), RTX 6000 handles 32
  warmup_steps:     100
  max_length:       128      # more than enough for payee strings; matches mpnet's sweet spot
