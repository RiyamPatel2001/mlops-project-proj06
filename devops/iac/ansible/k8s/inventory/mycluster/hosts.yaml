all:
  hosts:
    node1:
      ansible_host: FLOATING_IP_HERE
      ansible_user: cc
      ip: 192.168.1.11
      access_ip: 192.168.1.11
    node2:
      ansible_host: 192.168.1.12
      ansible_user: cc
      ip: 192.168.1.12
      access_ip: 192.168.1.12
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyCommand="ssh -A -W %h:%p -i ~/.ssh/id_rsa_chameleon -o StrictHostKeyChecking=no cc@FLOATING_IP_HERE"'
    node3:
      ansible_host: 192.168.1.13
