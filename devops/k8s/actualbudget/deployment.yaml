# =============================================================================
# ActualBudget — Deployment
# =============================================================================
# ActualBudget is the open-source self-hosted personal finance app that
# this MLOps project extends with an ML transaction categorizer.
#
# Upstream image — no custom build required.
# Data persists in /data via PVC (SQLite DB + uploaded files).
#
# Access: http://<CHAMELEON-FLOATING-IP>:30506
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actualbudget
  namespace: mlops
  labels:
    app: actualbudget
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actualbudget
  template:
    metadata:
      labels:
        app: actualbudget
        project: proj06
    spec:
      containers:
        - name: actualbudget
          image: ghcr.io/riyampatel2001/mlops-project-proj06/actual-custom:3b5202e7c85fccc048cd0733967405a48ee66372
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5006
              protocol: TCP
          env:
            - name: ACTUAL_UPLOAD_FILE_SYNC_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: actualbudget-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: actualbudget-data
          persistentVolumeClaim:
            claimName: actualbudget-data-pvc
      restartPolicy: Always
