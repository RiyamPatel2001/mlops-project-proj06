# =============================================================================
# ActualBudget Service — ClusterIP (internal only)
# =============================================================================
# ActualBudget is NOT exposed directly. External traffic goes through the
# actualbudget-proxy (nginx) which adds COOP/COEP headers for SharedArrayBuffer.
# Access: http://<CHAMELEON-FLOATING-IP>:30506  (via actualbudget-proxy)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: actualbudget
  namespace: mlops
  labels:
    app: actualbudget
    project: proj06
spec:
  type: ClusterIP
  selector:
    app: actualbudget
  ports:
    - name: http
      protocol: TCP
      port: 5006
      targetPort: 5006
