# =============================================================================
# ActualBudget Service — NodePort
# =============================================================================
# Exposes ActualBudget web UI on NodePort 30506.
# Access: http://<CHAMELEON-FLOATING-IP>:30506
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: actualbudget
  namespace: mlops
  labels:
    app: actualbudget
    project: proj06
spec:
  type: NodePort
  selector:
    app: actualbudget
  ports:
    - name: http
      protocol: TCP
      port: 5006
      targetPort: 5006
      nodePort: 30506
