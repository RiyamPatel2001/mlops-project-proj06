# =============================================================================
# MLflow Service — NodePort
# =============================================================================
# Exposes MLflow UI and REST API on NodePort 30500.
# Access: http://<CHAMELEON-FLOATING-IP>:30500
#
# Riyam sets: MLFLOW_TRACKING_URI=http://<CHAMELEON-FLOATING-IP>:30500
# when running the training Docker container.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mlflow-proj06
  namespace: mlops
  labels:
    app: mlflow-proj06
    project: proj06
spec:
  type: NodePort
  selector:
    app: mlflow-proj06
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
