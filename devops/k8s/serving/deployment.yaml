# =============================================================================
# Transaction Classifier (FastAPI) — Deployment
# =============================================================================
# Inference API for ML transaction categorisation.
# Built from serving/docker/Dockerfile.fastapi — push image before deploying:
#
#   docker build -t ghcr.io/proj06/transaction-classifier:latest \
#     -f serving/docker/Dockerfile.fastapi serving/
#   docker push ghcr.io/proj06/transaction-classifier:latest
#
# Model files live on the serving-models-pvc at /app/models.
# Copy them onto the PVC once the cluster is up (see README for commands).
#
# Access: http://<CHAMELEON-FLOATING-IP>:30508/predict
#         http://<CHAMELEON-FLOATING-IP>:30508/health
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-classifier
  namespace: mlops
  labels:
    app: transaction-classifier
    project: proj06
  annotations:
    # Argo CD Image Updater — automatically deploys new model versions
    # When serving team pushes ghcr.io/.../transaction-classifier:vX.Y.Z,
    # Image Updater detects it and commits the updated tag to Git.
    # Argo CD then syncs the new image to the cluster automatically.
    argocd-image-updater.argoproj.io/image-list: classifier=ghcr.io/riyampatel2001/mlops-project-proj06/transaction-classifier
    argocd-image-updater.argoproj.io/classifier.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: refactor-project
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxSurge: 0 — never spin up an extra pod before the old one is gone.
      # Required because serving-models-pvc is RWO (ReadWriteOnce): only one
      # pod may mount it at a time. With maxSurge=0 Kubernetes terminates the
      # old replica first, then starts the new one — safe, progressive rollout.
      # Demo: shows ArgoCD-driven rolling update; rollback via
      #   kubectl rollout undo deploy/transaction-classifier -n mlops
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: transaction-classifier
  template:
    metadata:
      labels:
        app: transaction-classifier
        project: proj06
    spec:
      # local-path PVCs are node-local, so serving must stay on the node that
      # provisions the model/artifact volumes.
      nodeSelector:
        kubernetes.io/hostname: proj06-node3
      containers:
        - name: fastapi
          image: ghcr.io/riyampatel2001/mlops-project-proj06/transaction-classifier:cf3e20670b3b0e6a2a4e26eb4759298092acfb9a
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: proj06-env
          env:
            - name: MODEL_TYPE
              value: "fasttext"
            - name: MODEL_BACKEND
              value: "native"
            - name: MODEL_PATH
              value: "/app/models/fasttext"
            - name: LABEL_MAP_PATH
              value: "/app/models/fasttext/label_map.json"
            - name: MODEL_VERSION
              value: "v1"
            - name: MODEL_REGISTRY_PATH
              value: "/app/models/layer1_registry.json"
            - name: MODEL_REGISTRY_REFRESH_SECONDS
              value: "30"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "4Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
              ephemeral-storage: "8Gi"
          volumeMounts:
            - name: serving-models
              mountPath: /app/models
            - name: artifacts
              mountPath: /app/artifacts
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: serving-models
          persistentVolumeClaim:
            claimName: serving-models-pvc
        - name: artifacts
          persistentVolumeClaim:
            claimName: artifacts-pvc
      restartPolicy: Always
