# =============================================================================
# Transaction Classifier (FastAPI) — Service (NodePort)
# =============================================================================
# Exposes the inference API on NodePort 30508.
# Access: http://<CHAMELEON-FLOATING-IP>:30508/predict
#         http://<CHAMELEON-FLOATING-IP>:30508/health
#
# ActualBudget can call internally: http://transaction-classifier.mlops:8000/predict
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: transaction-classifier
  namespace: mlops
  labels:
    app: transaction-classifier
    project: proj06
spec:
  type: NodePort
  selector:
    app: transaction-classifier
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30508
