apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlops
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.mlops.svc.cluster.local:9090
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: mlops
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: proj06
        folder: proj06
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: mlops
data:
  platform.json: |
    {
      "id": null,
      "title": "proj06 — MLOps Platform",
      "tags": ["proj06", "mlops"],
      "timezone": "utc",
      "refresh": "30s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Classifier Status",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [
            {
              "expr": "up{job=\"transaction-classifier\"}",
              "legendFormat": "classifier"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {"steps": [{"value": 0, "color": "red"}, {"value": 1, "color": "green"}]}
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "DB Connected",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [
            {
              "expr": "serving_db_connected",
              "legendFormat": "db"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DISCONNECTED", "color": "red"}, "1": {"text": "CONNECTED", "color": "green"}}}
              ],
              "thresholds": {"steps": [{"value": 0, "color": "red"}, {"value": 1, "color": "green"}]}
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Rate (10m)",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "targets": [
            {"expr": "serving:classify_error_rate_10m", "legendFormat": "error rate"}
          ],
          "options": {
            "colorMode": "value",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {"steps": [{"value": 0, "color": "green"}, {"value": 0.05, "color": "red"}]}
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Promotion Readiness",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "targets": [
            {"expr": "serving:promotion_ready_24h", "legendFormat": "ready"}
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "NOT READY", "color": "orange"}, "1": {"text": "READY", "color": "green"}}}
              ],
              "thresholds": {"steps": [{"value": 0, "color": "orange"}, {"value": 1, "color": "green"}]}
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request Rate By Source",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum by (source) (rate(serving_classify_requests_total{status=\"success\"}[5m]))",
              "legendFormat": "{{source}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"},
              "thresholds": {"steps": [{"value": 0, "color": "green"}, {"value": 10, "color": "red"}]}
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "P95 Latency",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {"expr": "serving:classify_latency_p95_10m", "legendFormat": "p95"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"},
              "thresholds": {"steps": [{"value": 0, "color": "green"}, {"value": 1.5, "color": "red"}]}
            }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Low Confidence Ratio (<= 0.60)",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {"expr": "serving:low_confidence_ratio_30m", "legendFormat": "low confidence"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {"mode": "palette-classic"},
              "thresholds": {"steps": [{"value": 0, "color": "green"}, {"value": 0.35, "color": "red"}]}
            }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "User Correction Rate",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {"expr": "serving:feedback_correction_rate_2h", "legendFormat": "corrected"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {"mode": "palette-classic"},
              "thresholds": {"steps": [{"value": 0, "color": "green"}, {"value": 0.25, "color": "red"}]}
            }
          }
        },
        {
          "id": 9,
          "type": "bargauge",
          "title": "Prediction Output Mix (24h)",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum by (category_group) (increase(serving_prediction_outputs_total[24h]))",
              "legendFormat": "{{category_group}}"
            }
          ],
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Feedback Outcomes (24h)",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum by (outcome) (increase(serving_feedback_total{status=\"success\"}[24h]))",
              "legendFormat": "{{outcome}}"
            }
          ],
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 11,
          "type": "table",
          "title": "Active Model Versions",
          "gridPos": {"x": 0, "y": 28, "w": 12, "h": 7},
          "targets": [
            {"expr": "serving_model_info", "legendFormat": "{{tier}}"}
          ]
        },
        {
          "id": 12,
          "type": "text",
          "title": "Trigger Policy",
          "gridPos": {"x": 12, "y": 28, "w": 12, "h": 7},
          "options": {
            "mode": "markdown",
            "content": "### Trigger policy\n\n- Promote only when offline retraining beats production by at least 1 accuracy point and `Promotion Readiness` stays READY.\n- Roll back when user correction rate stays above 25%, low-confidence predictions stay above 35%, or classify errors exceed 5% after a rollout.\n- Treat latency as an operational warning first; it becomes a rollback signal only when quality metrics also regress."
          }
        }
      ],
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {}
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops
  labels:
    app: grafana
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        project: proj06
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "mlops1234"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/platform.json"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlops
  labels:
    app: grafana
    project: proj06
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30030
