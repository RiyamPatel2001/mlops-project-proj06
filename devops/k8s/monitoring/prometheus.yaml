apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers: []

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['mlops']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

      - job_name: 'transaction-classifier'
        static_configs:
          - targets: ['transaction-classifier.mlops.svc.cluster.local:8000']
        metrics_path: '/metrics'
        scrape_timeout: 10s

  alerts.yml: |
    groups:
      - name: mlops-platform
        interval: 60s
        rules:
          - record: serving:classify_error_rate_10m
            expr: |
              sum(rate(serving_classify_requests_total{status="error"}[10m]))
              /
              clamp_min(sum(rate(serving_classify_requests_total[10m])), 0.001)

          - record: serving:classify_latency_p95_10m
            expr: |
              histogram_quantile(
                0.95,
                sum by (le) (
                  rate(serving_classify_request_latency_seconds_bucket{status="success"}[10m])
                )
              )

          - record: serving:low_confidence_ratio_30m
            expr: |
              sum(rate(serving_prediction_confidence_bucket{le="0.6"}[30m]))
              /
              clamp_min(sum(rate(serving_prediction_confidence_count[30m])), 0.001)

          - record: serving:feedback_correction_rate_2h
            expr: |
              sum(rate(serving_feedback_total{outcome="corrected",status="success"}[2h]))
              /
              clamp_min(sum(rate(serving_feedback_total{status="success"}[2h])), 0.001)

          - record: serving:promotion_ready_24h
            expr: |
              (
                (
                  sum(rate(serving_feedback_total{outcome="corrected",status="success"}[24h]))
                  /
                  clamp_min(sum(rate(serving_feedback_total{status="success"}[24h])), 0.001)
                ) < bool 0.15
              )
              *
              (
                (
                  sum(rate(serving_prediction_confidence_bucket{le="0.6"}[24h]))
                  /
                  clamp_min(sum(rate(serving_prediction_confidence_count[24h])), 0.001)
                ) < bool 0.20
              )
              *
              (sum(increase(serving_prediction_confidence_count[24h])) >= bool 200)
              *
              (sum(increase(serving_feedback_total{status="success"}[24h])) >= bool 25)
              *
              (max(up{job="transaction-classifier"}) == bool 1)
              *
              (max(serving_db_connected) == bool 1)

          - alert: ClassifierDown
            expr: up{job="transaction-classifier"} == 0
            for: 2m
            labels:
              severity: critical
              trigger: rollback
            annotations:
              summary: "Transaction classifier is down"
              description: "Prometheus cannot scrape the classifier metrics endpoint. Roll back if a fresh serving image caused the outage."

          - alert: ServingDatabaseDisconnected
            expr: max(serving_db_connected) == 0
            for: 5m
            labels:
              severity: critical
              trigger: rollback
            annotations:
              summary: "Serving database connection is unavailable"
              description: "Layer 2 lookups and feedback writes are degraded for 5+ minutes. Roll back if the issue started with a new serving release."

          - alert: ClassifierErrorRateHigh
            expr: |
              serving:classify_error_rate_10m > 0.05
              and
              sum(increase(serving_classify_requests_total[10m])) >= 20
            for: 10m
            labels:
              severity: warning
              trigger: rollback
            annotations:
              summary: "Classifier error rate is above 5%"
              description: "More than 5% of classify requests are failing over a 10 minute window. This is a rollback signal for the active serving build."

          - alert: ClassifierLatencyP95High
            expr: |
              serving:classify_latency_p95_10m > 1.5
              and
              sum(increase(serving_classify_requests_total{status="success"}[10m])) >= 20
            for: 10m
            labels:
              severity: warning
              trigger: investigate
            annotations:
              summary: "Classifier p95 latency is above 1.5 seconds"
              description: "Sustained latency regression usually points to model loading, resource pressure, or a bad rollout."

          - alert: PredictionLowConfidenceSpike
            expr: |
              serving:low_confidence_ratio_30m > 0.35
              and
              sum(increase(serving_prediction_confidence_count[30m])) >= 30
            for: 30m
            labels:
              severity: warning
              trigger: rollback
            annotations:
              summary: "Low-confidence predictions exceed 35%"
              description: "A sustained low-confidence spike is a leading indicator of drift or a poor model rollout. Roll back if this pairs with user corrections."

          - alert: UserCorrectionRateHigh
            expr: |
              serving:feedback_correction_rate_2h > 0.25
              and
              sum(increase(serving_feedback_total{status="success"}[2h])) >= 10
            for: 30m
            labels:
              severity: critical
              trigger: rollback
            annotations:
              summary: "Users are correcting more than 25% of reviewed predictions"
              description: "This is the strongest rollback trigger because it reflects direct user-visible quality regression on real traffic."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        project: proj06
    spec:
      serviceAccountName: prometheus
      nodeSelector:
        kubernetes.io/hostname: mlops-k8s-proj06
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '300m'
              memory: '512Mi'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-mlops
rules:
  - apiGroups: ['']
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-mlops
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: mlops
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
    project: proj06
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30090
