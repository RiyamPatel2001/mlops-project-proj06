apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers: []

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['mlops']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

      - job_name: 'mlflow'
        static_configs:
          - targets: ['mlflow-proj06.mlops.svc.cluster.local:5000']
        metrics_path: '/metrics'
        scrape_timeout: 10s

      - job_name: 'transaction-classifier'
        static_configs:
          - targets: ['transaction-classifier.mlops.svc.cluster.local:8000']
        metrics_path: '/metrics'
        scrape_timeout: 10s

      - job_name: 'minio'
        static_configs:
          - targets: ['minio.mlops.svc.cluster.local:9000']
        metrics_path: '/minio/v2/metrics/cluster'
        scrape_timeout: 10s

  alerts.yml: |
    groups:
      - name: mlops-platform
        interval: 60s
        rules:

          # Pod restarting repeatedly
          - alert: PodCrashLooping
            expr: rate(serving_requests_total[5m]) == 0 and serving_db_connected == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Classifier not serving and DB disconnected"
              description: "No requests processed and DB connection lost for 5+ minutes."

          # Classifier down
          - alert: ClassifierDown
            expr: up{job="transaction-classifier"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Transaction classifier is down"
              description: "Prometheus cannot scrape the classifier /metrics endpoint."

          # MLflow down
          - alert: MLflowDown
            expr: up{job="mlflow"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "MLflow tracking server is down"
              description: "Prometheus cannot reach MLflow. Training runs will fail."

          # High request rate (scale signal)
          - alert: ClassifierHighLoad
            expr: rate(serving_requests_total[5m]) > 10
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Classifier request rate above 10 req/s"
              description: "Consider scaling up the classifier deployment."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        project: proj06
    spec:
      serviceAccountName: prometheus
      nodeSelector:
        kubernetes.io/hostname: mlops-k8s-proj06
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '300m'
              memory: '512Mi'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-mlops
rules:
  - apiGroups: ['']
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-mlops
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: mlops
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
    project: proj06
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30090
