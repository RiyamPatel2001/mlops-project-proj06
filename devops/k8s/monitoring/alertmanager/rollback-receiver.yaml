apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollback-receiver
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollback-receiver
  namespace: mlops
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollback"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollback-receiver
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: rollback-receiver
    namespace: mlops
roleRef:
  kind: Role
  name: rollback-receiver
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rollback-receiver-script
  namespace: mlops
data:
  server.py: |
    #!/usr/bin/env python3
    """
    Alertmanager webhook receiver.
    POST /rollback  — runs kubectl rollout undo on transaction-classifier
    POST /log       — logs the alert (default receiver)
    GET  /health    — health check
    """
    import json
    import logging
    import subprocess
    from http.server import BaseHTTPRequestHandler, HTTPServer

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("rollback-receiver")

    NAMESPACE = "mlops"
    DEPLOYMENT = "transaction-classifier"

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            log.info(fmt % args)

        def _read_body(self):
            length = int(self.headers.get("Content-Length", 0))
            return json.loads(self.rfile.read(length)) if length else {}

        def _respond(self, code, msg):
            self.send_response(code)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            self.wfile.write(msg.encode())

        def do_GET(self):
            if self.path == "/health":
                self._respond(200, "ok")
            else:
                self._respond(404, "not found")

        def do_POST(self):
            body = self._read_body()
            alerts = body.get("alerts", [])

            if self.path == "/rollback":
                firing = [a for a in alerts if a.get("status") == "firing"]
                if firing:
                    log.warning("ROLLBACK triggered by %d alert(s): %s",
                                len(firing), [a["labels"].get("alertname") for a in firing])
                    result = subprocess.run(
                        ["kubectl", "rollout", "undo",
                         f"deployment/{DEPLOYMENT}", "-n", NAMESPACE],
                        capture_output=True, text=True
                    )
                    log.info("kubectl stdout: %s", result.stdout.strip())
                    if result.returncode != 0:
                        log.error("kubectl stderr: %s", result.stderr.strip())
                        self._respond(500, "rollback failed")
                        return
                    log.info("Rollback completed successfully")
                else:
                    log.info("Resolved alert received — no rollback needed")
                self._respond(200, "ok")

            elif self.path == "/log":
                for alert in alerts:
                    log.info("ALERT [%s] %s: %s",
                             alert.get("status", "?"),
                             alert["labels"].get("alertname", "?"),
                             alert.get("annotations", {}).get("summary", ""))
                self._respond(200, "ok")

            else:
                self._respond(404, "not found")

    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", 9094), Handler)
        log.info("Rollback receiver listening on :9094")
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-receiver
  namespace: mlops
  labels:
    app: rollback-receiver
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollback-receiver
  template:
    metadata:
      labels:
        app: rollback-receiver
        project: proj06
    spec:
      serviceAccountName: rollback-receiver
      containers:
        - name: receiver
          image: bitnami/kubectl:1.30
          command: ["/bin/sh", "-c"]
          args:
            - |
              apt-get update -qq && apt-get install -y -qq python3 2>/dev/null || true
              python3 /app/server.py
          ports:
            - containerPort: 9094
              name: http
          volumeMounts:
            - name: script
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: script
          configMap:
            name: rollback-receiver-script
---
apiVersion: v1
kind: Service
metadata:
  name: rollback-receiver
  namespace: mlops
  labels:
    app: rollback-receiver
    project: proj06
spec:
  selector:
    app: rollback-receiver
  ports:
    - name: http
      port: 9094
      targetPort: 9094
