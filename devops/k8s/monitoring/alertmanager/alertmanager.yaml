apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: mlops
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            trigger: rollback
          receiver: rollback-webhook
          continue: false

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://rollback-receiver.mlops.svc.cluster.local:9094/log'
            send_resolved: true

      - name: 'rollback-webhook'
        webhook_configs:
          - url: 'http://rollback-receiver.mlops.svc.cluster.local:9094/rollback'
            send_resolved: false

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: mlops
  labels:
    app: alertmanager
    project: proj06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        project: proj06
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: mlops
  labels:
    app: alertmanager
    project: proj06
spec:
  type: NodePort
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      nodePort: 30093
