# Argo CD Application — Platform Services
# Manages: namespace, postgres, minio, mlflow, sealed-secrets, actualbudget
# Any change pushed to devops/k8s/ in Git is automatically synced to the cluster.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RiyamPatel2001/mlops-project-proj06
    targetRevision: refactor-project
    path: devops/k8s
    directory:
      recurse: true
      exclude: "{argocd/*,serving/*,data_pipelines/*,training/*}"
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /spec/storageClassName
        - /spec/volumeMode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  managedNamespaceMetadata:
    labels:
      app.kubernetes.io/managed-by: argocd
