apiVersion: batch/v1
kind: CronJob
metadata:
  name: layer3-pipeline
  namespace: mlops
  labels:
    app: layer3-pipeline
    project: proj06
spec:
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: layer3-pipeline
            project: proj06
        spec:
          restartPolicy: Never
          containers:
            - name: batch-pipeline
              image: ghcr.io/riyampatel2001/mlops-project-proj06/batch-pipeline:latest
              imagePullPolicy: Always
              command: ["python", "batch_pipeline.py"]
              envFrom:
                - secretRef:
                    name: proj06-env
              env:
                - name: FEEDBACK_URL
                  value: "http://transaction-classifier.mlops.svc.cluster.local:8000/feedback/export"
                - name: MINIO_ENDPOINT
                  value: "http://minio.mlops.svc.cluster.local:9000"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: accesskey
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secretkey
                - name: MINIO_BUCKET
                  value: "data"
                - name: MINIO_PREFIX
                  value: "data/retraining"
              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
