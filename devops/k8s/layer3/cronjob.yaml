apiVersion: batch/v1
kind: CronJob
metadata:
  name: layer3-pipeline
  namespace: mlops
  labels:
    app: layer3-pipeline
    project: proj06
spec:
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: layer3-pipeline
            project: proj06
        spec:
          restartPolicy: Never
          containers:
            - name: layer3-pipeline
              image: ghcr.io/riyampatel2001/mlops-project-proj06/layer3-pipeline:latest
              imagePullPolicy: Always
              command: ["python", "-m", "model_pipeline.layer3.pipeline"]
              env:
                - name: MLFLOW_TRACKING_URI
                  value: "http://mlflow-proj06.mlops.svc.cluster.local:5000"
                - name: MINIO_ENDPOINT
                  value: "http://minio.mlops.svc.cluster.local:9000"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: accesskey
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secretkey
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: anthropic-credentials
                      key: api-key
                - name: POSTGRES_HOST
                  value: "postgres.mlops.svc.cluster.local"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: dbname
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: password
                - name: POSTGRES_DSN
                  value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.mlops.svc.cluster.local:5432/$(POSTGRES_DB)"
              volumeMounts:
                - name: artifacts
                  mountPath: /app/artifacts
                - name: config
                  mountPath: /app/model_pipeline/layer2/config.yaml
                  subPath: config.yaml
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "1000m"
                  memory: "4Gi"
          volumes:
            - name: artifacts
              persistentVolumeClaim:
                claimName: artifacts-pvc
            - name: config
              configMap:
                name: layer2-config
