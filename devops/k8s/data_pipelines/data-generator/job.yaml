apiVersion: batch/v1
kind: Job
metadata:
  name: data-generator
  namespace: mlops
  labels:
    app: data-generator
    project: proj06
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: data-generator
        project: proj06
    spec:
      restartPolicy: Never
      containers:
        - name: data-generator
          image: ghcr.io/riyampatel2001/mlops-project-proj06/data-generator:latest
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: proj06-env
          env:
            - name: SERVING_URL
              value: "http://transaction-classifier.mlops.svc.cluster.local:8000"
            - name: MINIO_ENDPOINT
              value: "http://minio.mlops.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin123"
            - name: MINIO_BUCKET
              value: "data"
