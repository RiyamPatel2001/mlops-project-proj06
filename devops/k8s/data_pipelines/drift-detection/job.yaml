apiVersion: batch/v1
kind: Job
metadata:
  name: drift-detection
  namespace: mlops
  labels:
    app: drift-detection
    project: proj06
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: drift-detection
        project: proj06
    spec:
      restartPolicy: Never
      containers:
        - name: drift-detection
          image: ghcr.io/riyampatel2001/mlops-project-proj06/drift-detection:latest
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: FEEDBACK_URL
              value: "http://serving-service.mlops.svc.cluster.local:8000/feedback/export"
            - name: MINIO_ENDPOINT
              value: "http://minio.mlops.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin123"
            - name: MINIO_BUCKET
              value: "data"
