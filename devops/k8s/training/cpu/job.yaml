apiVersion: batch/v1
kind: Job
metadata:
  name: training-cpu
  namespace: mlops
  labels:
    app: training-cpu
    project: proj06
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: training-cpu
        project: proj06
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      restartPolicy: Never
      containers:
        - name: training-cpu
          image: ghcr.io/riyampatel2001/mlops-project-proj06/training-cpu:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          envFrom:
            - secretRef:
                name: proj06-env
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-proj06.mlops.svc.cluster.local:5000"
            - name: MODEL_REGISTRY_PATH
              value: "/models/layer1_registry.json"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: serving-models-pvc
