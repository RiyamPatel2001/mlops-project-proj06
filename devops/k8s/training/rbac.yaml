apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: mlops
  labels:
    project: proj06
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-manager
  namespace: mlops
  labels:
    project: proj06
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner-jobs
  namespace: mlops
  labels:
    project: proj06
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-manager
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: mlops
