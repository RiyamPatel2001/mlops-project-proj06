apiVersion: batch/v1
kind: CronJob
metadata:
  name: retraining-trigger
  namespace: mlops
  labels:
    app: retraining-trigger
    project: proj06
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 7200
      template:
        metadata:
          labels:
            app: retraining-trigger
            project: proj06
        spec:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          restartPolicy: Never
          containers:
            - name: retraining
              image: ghcr.io/riyampatel2001/mlops-project-proj06/training-cpu:latest
              imagePullPolicy: Always
              command: ["python", "retrain.py", "--config", "config.yaml"]
              envFrom:
                - secretRef:
                    name: proj06-env
              env:
                - name: MLFLOW_TRACKING_URI
                  valueFrom:
                    secretKeyRef:
                      name: mlflow-uri
                      key: uri
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: accesskey
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secretkey
                - name: MINIO_ENDPOINT_URL
                  value: "http://minio.mlops.svc.cluster.local:9000"
                - name: MODEL_REGISTRY_PATH
                  value: "/models/layer1_registry.json"
              resources:
                requests:
                  cpu: "2000m"
                  memory: "4Gi"
                limits:
                  cpu: "4000m"
                  memory: "8Gi"
              volumeMounts:
                - name: model-storage
                  mountPath: /models
          volumes:
            - name: model-storage
              persistentVolumeClaim:
                claimName: serving-models-pvc
