# =============================================================================
# Retraining Trigger CronJob
# =============================================================================
# Runs at 04:00 UTC every Sunday — 2 hours after layer3 batch pipeline (02:00).
# Cleans up any previous completed training job, then spawns a fresh one.
#
# Dependency: pipeline-runner ServiceAccount (rbac.yaml must be applied first)
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: retraining-trigger
  namespace: mlops
  labels:
    app: retraining-trigger
    project: proj06
spec:
  schedule: '0 4 * * 0'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: retraining-trigger
            project: proj06
        spec:
          serviceAccountName: pipeline-runner
          restartPolicy: Never
          containers:
            - name: trigger
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  JOB_NAME="training-cpu-$(date +%Y%m%d%H%M%S)"
                  echo "=== Retraining trigger fired at $(date) ==="

                  # Remove any previously completed training jobs to avoid name collisions
                  echo "--- Cleaning up old training jobs ---"
                  kubectl -n mlops delete jobs -l app=training-cpu \
                    --field-selector=status.conditions[0].type=Complete \
                    --ignore-not-found 2>/dev/null || true

                  echo "--- Spawning training job: $JOB_NAME ---"
                  cat <<EOF | kubectl apply -f -
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: $JOB_NAME
                    namespace: mlops
                    labels:
                      app: training-cpu
                      project: proj06
                      triggered-by: retraining-trigger
                  spec:
                    ttlSecondsAfterFinished: 7200
                    backoffLimit: 1
                    template:
                      metadata:
                        labels:
                          app: training-cpu
                          project: proj06
                      spec:
                        restartPolicy: Never
                        nodeSelector:
                          proj06-role: workers
                        containers:
                          - name: training-cpu
                            image: ghcr.io/riyampatel2001/mlops-project-proj06/training-cpu:latest
                            imagePullPolicy: Always
                            resources:
                              requests:
                                cpu: "2000m"
                                memory: "4Gi"
                              limits:
                                cpu: "4000m"
                                memory: "8Gi"
                            envFrom:
                              - secretRef:
                                  name: proj06-env
                            env:
                              - name: MLFLOW_TRACKING_URI
                                valueFrom:
                                  secretKeyRef:
                                    name: mlflow-uri
                                    key: uri
                              - name: MINIO_ACCESS_KEY
                                valueFrom:
                                  secretKeyRef:
                                    name: minio-credentials
                                    key: accesskey
                              - name: MINIO_SECRET_KEY
                                valueFrom:
                                  secretKeyRef:
                                    name: minio-credentials
                                    key: secretkey
                              - name: MINIO_ENDPOINT_URL
                                value: http://minio.mlops.svc.cluster.local:9000
                              - name: DATA_PATH
                                value: "/data/processed"
                              - name: MODEL_OUTPUT_PATH
                                value: "/models"
                            volumeMounts:
                              - name: data-storage
                                mountPath: /data
                              - name: model-storage
                                mountPath: /models
                        volumes:
                          - name: data-storage
                            persistentVolumeClaim:
                              claimName: data-pvc
                          - name: model-storage
                            persistentVolumeClaim:
                              claimName: serving-models-pvc
                  EOF

                  echo "--- Job $JOB_NAME created successfully ---"
                  echo "--- Watching for job start (60s timeout) ---"
                  kubectl -n mlops wait --for=condition=ready pod \
                    -l app=training-cpu,triggered-by=retraining-trigger \
                    --timeout=60s 2>/dev/null || true
                  echo "=== Trigger complete ==="
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
