apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer2-store
  namespace: mlops
  labels:
    app: layer2-store
    project: proj06
spec:
  replicas: 0
  selector:
    matchLabels:
      app: layer2-store
  template:
    metadata:
      labels:
        app: layer2-store
        project: proj06
    spec:
      containers:
        - name: layer2-store
          image: ghcr.io/riyampatel2001/mlops-project-proj06/layer2-store:latest
          imagePullPolicy: Always
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-proj06.mlops.svc.cluster.local:5000
            - name: MINIO_ENDPOINT
              value: http://minio.mlops.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: POSTGRES_HOST
              value: postgres.mlops.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
            - name: config
              mountPath: /app/model_pipeline/layer2/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 4Gi
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: artifacts-pvc
        - name: config
          configMap:
            name: layer2-config
