name: Build and Push Images

on:
  push:
    branches: [refactor-project]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: riyampatel2001/mlops-project-proj06

jobs:

  build-serving:
    name: Serving (transaction-classifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: serving
          file: serving/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/transaction-classifier:latest
            ghcr.io/${{ env.REPO }}/transaction-classifier:${{ github.sha }}

  build-training-cpu:
    name: Training (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: training
          file: training/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/training-cpu:latest
            ghcr.io/${{ env.REPO }}/training-cpu:${{ github.sha }}

  build-batch-pipeline:
    name: Data Pipeline (batch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: data_pipeline/batch_pipeline
          file: data_pipeline/batch_pipeline/Dockerfile.batch
          push: true
          tags: ghcr.io/${{ env.REPO }}/batch-pipeline:latest

  build-data-generator:
    name: Data Pipeline (generator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: data_pipeline/data_generator
          file: data_pipeline/data_generator/Dockerfile.generator
          push: true
          tags: ghcr.io/${{ env.REPO }}/data-generator:latest

  build-ingestion:
    name: Data Pipeline (ingestion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: data_pipeline/ingestion
          file: data_pipeline/ingestion/Dockerfile.ingest
          push: true
          tags: ghcr.io/${{ env.REPO }}/data-ingestion:latest

  build-layer2:
    name: Model Pipeline (layer2 store)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: model_pipeline/layer2/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO }}/layer2-store:latest


  build-embedding-service:
    name: Model Pipeline (embedding service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: model_pipeline/embedding_service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO }}/embedding-service:latest
  build-actualbudget:
    name: ActualBudget (actual-custom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: actual
          file: actual/sync-server.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/actual-custom:latest
            ghcr.io/${{ env.REPO }}/actual-custom:${{ github.sha }}
          build-args: BUILD_NODE_MEMORY_MB=3072

  # Pin SHA-tagged images into deployment manifests so Argo detects a real
  # diff and rolls pods automatically — no manual kubectl rollout restart needed.
  # Runs after both serving and actualbudget builds finish.
  # [skip ci] prevents this commit from re-triggering the workflow.
  pin-images:
    name: Pin image SHAs in manifests
    runs-on: ubuntu-latest
    needs: [build-serving, build-actualbudget]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor-project
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update deployment manifests with exact SHA tags
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ env.REPO }}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Pull latest HEAD first (other jobs may have pushed concurrently)
          # Must happen before sed so working tree is clean for rebase
          git pull --rebase origin refactor-project

          # Pin transaction-classifier
          sed -i "s|ghcr.io/${REPO}/transaction-classifier:[^ ]*|ghcr.io/${REPO}/transaction-classifier:${SHA}|g" \
            devops/k8s/serving/deployment.yaml

          # Pin actual-custom
          sed -i "s|ghcr.io/${REPO}/actual-custom:[^ ]*|ghcr.io/${REPO}/actual-custom:${SHA}|g" \
            devops/k8s/actualbudget/deployment.yaml

          git add devops/k8s/serving/deployment.yaml devops/k8s/actualbudget/deployment.yaml

          if git diff --cached --quiet; then
            echo "No image tag changes to commit."
          else
            git commit -m "chore(deploy): pin images to ${SHA} [skip ci]"
            git push origin refactor-project
          fi

